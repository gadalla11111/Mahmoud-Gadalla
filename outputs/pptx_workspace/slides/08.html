<!DOCTYPE html>
<html dir="rtl">
<head><meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:960px; height:540px; position:relative; overflow:hidden; background:#0E0E0E; font-family:Arial,sans-serif; }
</style>
</head>
<body>
<!-- Left black panel -->
<div style="position:absolute;top:0;left:0;width:400px;height:540px;background:#040404;"></div>
<!-- Gold left bar -->
<div style="position:absolute;top:0;left:0;width:6px;height:540px;background:#C8A24C;"></div>
<!-- Bottom red bar -->
<div style="position:absolute;bottom:0;left:0;width:960px;height:4px;background:#A4232A;"></div>

<!-- Left: brand reveal - vertically centered -->
<div style="position:absolute;top:0;left:0;width:400px;height:540px;display:flex;flex-direction:column;justify-content:center;padding:40px 36px;">
  <p style="color:#C8A24C;font-size:11px;letter-spacing:4px;margin-bottom:24px;direction:ltr;">THE ANSWER</p>
  <h1 style="color:#C8A24C;font-size:72px;font-weight:bold;letter-spacing:4px;line-height:1;direction:ltr;">JAHIZOON</h1>
  <h2 style="color:#FFFFFF;font-size:36px;margin-top:12px;direction:rtl;">جاهزون</h2>
  <div style="width:60px;height:2px;background:#C8A24C;margin:20px 0;"></div>
  <p style="color:#888888;font-size:14px;line-height:1.7;direction:rtl;">برنامج وطني يُحوّل الخريجين إلى كفاءات موثّقة جاهزة للتوظيف الفوري</p>
</div>

<!-- Right: 3 pillars filling height -->
<div style="position:absolute;top:0;left:408px;right:0;height:540px;display:flex;flex-direction:column;gap:0;">
  <div style="flex:1;border-right:4px solid #C8A24C;padding:28px 24px;display:flex;flex-direction:column;justify-content:center;border-bottom:1px solid #1A1A1A;">
    <p style="color:#C8A24C;font-size:12px;letter-spacing:3px;margin-bottom:8px;direction:ltr;">TRAIN</p>
    <p style="color:#FFFFFF;font-size:20px;font-weight:bold;direction:rtl;">تدريب مكثف · 12 أسبوعاً</p>
    <p style="color:#666666;font-size:13px;margin-top:8px;direction:rtl;">مهارات العمل الفعلية · مدربون معتمدون</p>
  </div>
  <div style="flex:1;border-right:4px solid #A4232A;padding:28px 24px;display:flex;flex-direction:column;justify-content:center;border-bottom:1px solid #1A1A1A;background:#0D0000;">
    <p style="color:#A4232A;font-size:12px;letter-spacing:3px;margin-bottom:8px;direction:ltr;">ASSESS</p>
    <p style="color:#FFFFFF;font-size:20px;font-weight:bold;direction:rtl;">تقييم مصوّر · موثّق</p>
    <p style="color:#666666;font-size:13px;margin-top:8px;direction:rtl;">امتحان نهائي مسجّل يراه أصحاب العمل</p>
  </div>
  <div style="flex:1;border-right:4px solid #C8A24C;padding:28px 24px;display:flex;flex-direction:column;justify-content:center;">
    <p style="color:#C8A24C;font-size:12px;letter-spacing:3px;margin-bottom:8px;direction:ltr;">PLACE</p>
    <p style="color:#FFFFFF;font-size:20px;font-weight:bold;direction:rtl;">توظيف مضمون</p>
    <p style="color:#666666;font-size:13px;margin-top:8px;direction:rtl;">شبكة شركاء مؤسسيين · ربط مباشر</p>
  </div>
</div>
</body>
</html>
