name: Stale

on:
  schedule:
    - cron: "0 8 * * *"  # daily 08:00 UTC

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 30
          days-before-close: 7
          stale-issue-message: "This issue has been inactive for 30 days and is marked stale. It will close in 7 days unless there is new activity."
          stale-pr-message: "This PR has been inactive for 30 days and is marked stale. It will close in 7 days unless there is new activity."
          close-issue-message: "Closed due to inactivity."
          close-pr-message: "Closed due to inactivity."
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security,do-not-close"
          exempt-pr-labels: "pinned,security,do-not-close"
