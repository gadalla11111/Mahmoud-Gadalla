name: DiffGate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  diffgate:
    name: Code review gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reset to base branch (diff-aware mode)
        run: git reset --mixed "origin/${{ github.base_ref }}"

      - name: Run DiffGate
        run: npx diffgate-review@latest check --working --github
