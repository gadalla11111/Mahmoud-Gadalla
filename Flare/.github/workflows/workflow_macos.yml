# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
name: MacOS Build

on:
  push:
    paths:
      - '**/*'
      - '!appveyor.yml'
      - '!README.md'
      - '!doc/**'
      - '!**/.github/**'
      - '.github/workflows/workflow_macos.yml'
  pull_request:
    paths:
      - '**/*'
      - '!appveyor.yml'
      - '!README.md'
      - '!doc/**'
      - '!**/.github/**'
      - '.github/workflows/workflow_macos.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macOS:
    timeout-minutes: 180
    env:
      GIT_LFS_SKIP_SMUDGE: '1'
      DMG: ''
    runs-on: macos-15-intel
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          lfs: false
          submodules: false
          fetch-depth: 0
          persist-credentials: true
          clean: true

      - name: Pre-check git remote reachability
        run: |
          # Only attempt a remote reachability check if an 'origin' remote exists.
          if git remote get-url origin >/dev/null 2>&1; then
            set -e
            n=0
            until [ $n -ge 3 ]
            do
              if git ls-remote origin >/dev/null 2>&1; then
                echo "git remote reachable"
                break
              fi
              n=$((n+1))
              echo "git remote not reachable, retrying ($n)"
              sleep 3
            done
          else
            echo "No 'origin' remote configured; skipping git remote reachability check (actions/checkout will handle repository checkout)."
          fi

      - name: Checkout diagnostic info
        run: |
          echo "Git version: $(git --version)"
          git status
          git branch -vv
          git log -1 --oneline
          git remote -v
          git rev-parse --is-shallow-repository
          git tag -l | head -n 20

      - name: Prune local tags to avoid non-fast-forward conflicts from rolling nightly tag updates
        run: |
          git tag -l | xargs -r git tag -d

      - name: Clean Python symlinks
        run: |
          # shellcheck disable=SC2012,SC2016,SC2155,SC2156,SC2046,SC2086,SC2235
          find /usr/local/bin -type l \( -name "python*" -o -name "pip*" -o -name "2to3*" -o -name "idle*" -o -name "pydoc*" \) \
            -exec sh -c 'file -b {} | grep -q "symbolic link to .*Python.framework" && echo "Removing {}" && rm {}' \;
          for py_version in python@3.11 python@3.12 python@3.13 python@3.14; do
            if brew list --versions $py_version >/dev/null; then
              brew unlink $py_version || true
            fi
          done
          brew link --overwrite --force python@3.14 || true

      - name: Install libraries
        run: |
          # shellcheck disable=SC2012,SC2016,SC2155,SC2156,SC2046,SC2086,SC2235
          # Skip auto-update: it's slow and causes symlink conflicts with pre-installed Qt 6
          export HOMEBREW_NO_AUTO_UPDATE=1

          # The macos-15-intel runner has Qt 6 (qtbase, qtdeclarative, etc.) pre-linked.
          # Unlinking them prevents "Could not symlink … belonging to qtbase" errors when
          # installing qt@5 for the release build.
          for qtpkg in qtbase qtdeclarative qt; do
            brew unlink "$qtpkg" 2>/dev/null || true
          done

          checkPkgAndInstall() {
            for pkg in "$@"; do
              if brew ls --versions "$pkg" >/dev/null 2>&1; then
                echo "$pkg already installed"
              else
                brew install --overwrite "$pkg"
              fi
            done
          }

          checkPkgAndInstall pkg-config glew lz4 libjpeg libpng lzo boost libusb libmypaint ccache jpeg-turbo ninja opencv openjph openexr qt@5

      - name: Set up cache
        run: |
          export PATH="/usr/local/opt/ccache/libexec:$PATH"
          mkdir -p /Users/runner/.ccache
      - uses: actions/cache@v4
        with:
          path: /Users/runner/.ccache
          key: ${{ runner.os }}-${{ github.sha }}
          restore-keys: ${{ runner.os }}-

      - name: Install libzip for unzip.h (macOS)
        run: |
          brew install libzip || true

      - name: Build libtiff
        run: |
          cd thirdparty/tiff-4.0.3
          chmod +x configure
          CFLAGS='-fPIC' CXXFLAGS='-fPIC' ./configure --disable-lzma
          make -j $(sysctl -n hw.ncpu)
          make install

      - name: Build
        run: |
          export PKG_CONFIG_PATH="/usr/local/opt/jpeg-turbo/lib/pkgconfig:$PKG_CONFIG_PATH"
          cd flare
          rm -rf build
          mkdir -p build
          cd build
          set -o pipefail
          set +e
          cmake -S ../sources -B . -G Ninja \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DQT_PATH=$(brew --prefix qt@5)/lib \
            -DQt5_DIR=$(brew --prefix qt@5)/lib/cmake/Qt5 \
            -DCMAKE_PREFIX_PATH=$(brew --prefix qt@5)/lib/cmake/Qt5 \
            -DWITH_TRANSLATION=OFF \
            -DWITH_SYSTEM_LZO=ON \
            -DWITH_LZODRIVER=OFF > cmake_configure.log 2>&1
          rc=$?
          set -e
          echo "--- Begin CMake configure log ---"
          if [ -f cmake_configure.log ]; then cat cmake_configure.log; fi
          echo "--- End CMake configure log ---"
          if [ $rc -ne 0 ]; then
            echo "CMake configure failed with exit code $rc"
            exit $rc
          fi
          if ! (ninja -j $(sysctl -n hw.ncpu) 2>&1 | tee build.log); then
            echo "Build failed; dumping build log..."
            if [ -f build.log ]; then cat build.log; fi
            exit 1
          fi

          echo "=== CMake target list for debug ==="
          ninja -t targets | grep -E "(^flare_legacy$|^Flare$|^Flare )" || true

          echo "=== Flare.app check post-build ==="
          find . -name 'Flare.app' -maxdepth 8 -print || true

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-macos
          path: |
            flare/build/cmake_configure.log
            flare/build/build.log
          if-no-files-found: ignore

      - name: Introduce Libraries and Stuff
        run: |
          cd flare/build
          APPBUNDLE=$(find . -type d -name 'Flare.app' | head -n 1)
          if [ -z "$APPBUNDLE" ]; then
            echo "ERROR: Flare.app bundle not found under flare/build. Directory tree:" 1>&2
            find . -maxdepth 4 -type d | sed 's/^/  /' 1>&2
            exit 1
          fi
          echo "Found app bundle: $APPBUNDLE"
          cd "$(dirname "$APPBUNDLE")"

          # copy portable stuff if present
          cp -pr ../../../stuff Flare.app/portablestuff 2>/dev/null || true

          BUNDLE_BINARY=$(find Flare.app/Contents/MacOS -maxdepth 1 -type f -perm +111 | head -n 1)
          if [ -z "$BUNDLE_BINARY" ]; then
            echo "WARNING: no executable binary found in Flare.app/Contents/MacOS; skipping macdeployqt"
            ls -al Flare.app/Contents/MacOS || true
            exit 0
          fi

          if [ ! -x "/usr/local/opt/qt@5/bin/macdeployqt" ]; then
            echo "ERROR: macdeployqt not found at /usr/local/opt/qt@5/bin/macdeployqt"
            ls -l /usr/local/opt/qt@5/bin || true
            exit 1
          fi

          /usr/local/opt/qt@5/bin/macdeployqt Flare.app -verbose=0 -always-overwrite \
            -executable="Flare.app/Contents/MacOS/$(basename "$BUNDLE_BINARY")" \
            $(for h in lzocompress lzodecompress tcleanup tcomposer tconverter tfarmcontroller tfarmserver; do [ -f "Flare.app/Contents/MacOS/$h" ] && echo "-executable=Flare.app/Contents/MacOS/$h"; done)

      - name: Modify Library Paths
        run: |
          FRAMEWORKS_DIR=$(find flare/build -path "*/Flare.app/Contents/Frameworks" -type d | head -n 1)
          if [ -z "$FRAMEWORKS_DIR" ]; then
            echo "Frameworks directory not found; skipping install_name_tool adjustments."
            exit 0
          fi
          echo "Using frameworks dir: $FRAMEWORKS_DIR"
          cd "$FRAMEWORKS_DIR"
          for TARGETLIB in *.dylib; do
            otool -L "$TARGETLIB" | grep ".dylib" | grep -v "$TARGETLIB" | grep -v "@executable_path/../Frameworks" | awk '{print $1}' | while read -r FROMPATH; do
              LIBNAME=$(basename "$FROMPATH")
              if [[ -e ./$LIBNAME ]]; then
                install_name_tool -change "$FROMPATH" "@executable_path/../Frameworks/$LIBNAME" "$TARGETLIB"
              fi
            done
          done

      - name: Create Artifact
        run: |
          cd flare/build
          APPBUNDLE=$(find . -type d -name 'Flare.app' | head -n 1)
          if [ -z "$APPBUNDLE" ]; then
            echo "ERROR: Flare.app bundle not found for DMG creation" 1>&2
            find . -type d | sed 's/^/  /' 1>&2
            exit 1
          fi
          BUNDLE_DIR="$(cd "$(dirname "$APPBUNDLE")" && pwd)"
          cd "$BUNDLE_DIR"
          echo "Creating DMG from $BUNDLE_DIR/Flare.app..."
          ATTEMPT=0
          while [ $ATTEMPT -lt 10 ]; do
            /usr/local/opt/qt@5/bin/macdeployqt Flare.app -dmg -verbose=0 && \
            [ -f Flare.dmg ] && break
            ATTEMPT=$((ATTEMPT+1))
            echo "Attempt $ATTEMPT failed to build DMG."
          done
          if [ -f Flare.dmg ]; then
            echo "DMG=$BUNDLE_DIR/Flare.dmg" >> $GITHUB_ENV
          else
            echo "DMG=" >> $GITHUB_ENV
          fi

      - name: Smoke Test – verify app launches (headless)
        if: always()
        run: |
          SMOKE_LOG="flare/build/smoke_test.log"
          mkdir -p "$(dirname "$SMOKE_LOG")"
          echo "=== macOS Smoke Test ===" | tee "$SMOKE_LOG"

          # Find the binary inside the .app bundle
          APP_BINARY="flare/build/flare/Flare.app/Contents/MacOS/Flare"
          if [ ! -f "$APP_BINARY" ]; then
            # Fallback: look anywhere under flare/build
            APP_BINARY=$(find flare/build -path "*/MacOS/Flare" -type f 2>/dev/null | head -1)
          fi

          if [ -z "$APP_BINARY" ] || [ ! -f "$APP_BINARY" ]; then
            echo "SMOKE TEST SKIP: Flare binary not found" | tee -a "$SMOKE_LOG"
          else
            echo "Testing: $APP_BINARY" | tee -a "$SMOKE_LOG"
            echo "--- ldd / otool -L output (direct dependencies) ---" | tee -a "$SMOKE_LOG"
            otool -L "$APP_BINARY" 2>&1 | tee -a "$SMOKE_LOG"
            echo "" | tee -a "$SMOKE_LOG"

            # Check for broken @rpath / @executable_path references
            echo "--- Checking for missing dylibs ---" | tee -a "$SMOKE_LOG"
            MISSING=0
            while IFS= read -r line; do
              lib=$(echo "$line" | awk '{print $1}')
              case "$lib" in
                /usr/*|/System/*|@executable_path/*|@rpath/*|@loader_path/*) continue ;;
                *) if [ -n "$lib" ] && [ ! -f "$lib" ]; then
                     echo "  MISSING: $lib" | tee -a "$SMOKE_LOG"
                     MISSING=$((MISSING+1))
                   fi ;;
              esac
            done < <(otool -L "$APP_BINARY" 2>/dev/null | tail -n +2)
            if [ $MISSING -eq 0 ]; then
              echo "SMOKE TEST OK: All direct dylib references resolved" | tee -a "$SMOKE_LOG"
            fi
            echo "" | tee -a "$SMOKE_LOG"

            # Runtime launch test with 8-second timeout (macOS CI has a display)
            echo "--- Runtime launch test (8-second timeout) ---" | tee -a "$SMOKE_LOG"
            timeout 8 "$APP_BINARY" 2>&1 | tee -a "$SMOKE_LOG" &
            APP_PID=$!
            sleep 8
            if kill -0 $APP_PID 2>/dev/null; then
              kill $APP_PID 2>/dev/null
              echo "SMOKE TEST PASS: Flare ran 8+ seconds without crashing" | tee -a "$SMOKE_LOG"
            else
              wait $APP_PID 2>/dev/null; EXIT=$?
              echo "SMOKE TEST: Flare exited with code $EXIT" | tee -a "$SMOKE_LOG"
              if [ $EXIT -ne 0 ] && [ $EXIT -ne 124 ]; then
                echo "SMOKE TEST WARN: Non-zero exit code $EXIT" | tee -a "$SMOKE_LOG"
              fi
            fi
          fi

      - name: Upload smoke test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-macos
          path: flare/build/smoke_test.log
          if-no-files-found: ignore

      - name: Upload macOS artifact
        if: ${{ env.DMG != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: Flare-${{ runner.os }}-${{ github.sha }}
          path: ${{ env.DMG }}
          if-no-files-found: ignore

      - name: Post build logs to PR
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && always() }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request ? context.payload.pull_request.number : undefined;
            if (!pr) { core.info('Not a pull_request event; skipping PR log posting.'); return; }
            function readTrunc(path) {
              try {
                if (!fs.existsSync(path)) return '(missing)';
                const content = fs.readFileSync(path, 'utf8');
                if (content.length > 12000) return content.slice(0, 6000) + '\n\n... (truncated) ...\n\n' + content.slice(-6000);
                return content;
              } catch (e) { return `(error reading ${path}): ${e.message}`; }
            }
            const cmake = readTrunc('flare/build/cmake_configure.log');
            const build = readTrunc('flare/build/build.log');
            const smoke = readTrunc('flare/build/smoke_test.log');
            const note = (!fs.existsSync('flare/build/cmake_configure.log') && !fs.existsSync('flare/build/build.log')) ? '\n\n**Note:** log files missing – checkout or prior step may have failed.' : '';
            const body = `**Automated build logs – macOS (truncated)**\n\n--- CMake configure log ---\n${cmake}\n\n--- Build log ---\n${build}\n\n--- Smoke test (dylib check + launch test) ---\n${smoke}${note}`;
            await github.rest.issues.createComment({ owner, repo, issue_number: pr, body });
