# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
name: Windows Build

on:
  push:
    paths:
      - '**/*'
      - '!appveyor.yml'
      - '!README.md'
      - '!doc/**'
      - '!**/.github/**'
      - '.github/workflows/workflow_windows.yml'
  pull_request:
    paths:
      - '**/*'
      - '!appveyor.yml'
      - '!README.md'
      - '!doc/**'
      - '!**/.github/**'
      - '.github/workflows/workflow_windows.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Windows:
    runs-on: windows-2022
    env:
      MSVCVERSION: "Visual Studio 17 2022"
      BOOST_TOOLSET: "14.3"
      BOOST_VERSION: "1.87.0"
      BOOST_ROOT: C:\local\boost_1_87_0
      OPENCV_VERSION: "4.11.0"
      OpenCV_DIR: C:\tools\opencv\build
      CCACHE_DIR: ${{ github.workspace }}\.ccache
      GIT_LFS_SKIP_SMUDGE: '1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          lfs: false
          submodules: false
          fetch-depth: 0
          persist-credentials: true
          clean: true

      - name: Pre-check git remote reachability
        shell: pwsh
        run: |
          # Only attempt a remote reachability check if an 'origin' remote exists.
          $origin = $null
          try { $origin = git remote get-url origin 2>$null } catch { $null }
          if ($origin) {
            $tries = 0
            while ($tries -lt 3) {
              try {
                git ls-remote origin -h | Out-Null
                Write-Host "git remote reachable"
                break
              } catch {
                $tries++
                Write-Host "git remote not reachable, retrying ($tries)"
                Start-Sleep -Seconds 3
              }
            }
          } else {
            Write-Host "No 'origin' remote configured; skipping git remote reachability check (actions/checkout will perform the checkout)."
          }
      - name: Checkout diagnostic info
        shell: pwsh
        run: |
          Write-Host "Git version: $(git --version)"
          git status
          git branch -vv
          git log -1 --oneline
          git remote -v
          git rev-parse --is-shallow-repository
          git tag -l | Select-Object -First 20
      - name: Prune local tags to avoid non-fast-forward conflicts from rolling nightly tag updates
        shell: pwsh
        run: |
          git tag -l | ForEach-Object { git tag -d $_ }

      - name: Install Build Tools
        run: |
          choco install ccache -y
          ccache -M 2G
        shell: cmd

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Download and Force Third-Party Libs
        run: |
          @echo on
          :: 1. Download prebuilt thirdparty .lib/.dll files
          curl -fsSL -o libs.zip https://github.com/andeon/opentoonz-thirdparty-libs/releases/download/prebuilt-libs-v1/thirdparty-libs.zip
          
          :: 2. Extract at repo root — the zip already has a thirdparty/ prefix,
          ::    so this overwrites the LFS-pointer .lib/.dll files with real
          ::    binaries while keeping the header files from the git checkout.
          7z x -y libs.zip
          
          :: 3. Configure headers (tiff, libpng)
          cd thirdparty
          
          copy /Y tiff-4.0.3\libtiff\tif_config.vc.h tiff-4.0.3\libtiff\tif_config.h
          copy /Y tiff-4.0.3\libtiff\tiffconf.vc.h tiff-4.0.3\libtiff\tiffconf.h
          copy /Y libpng-1.6.21\scripts\pnglibconf.h.prebuilt libpng-1.6.21\pnglibconf.h
          
          cd ..
          
          :: 4. Set environment variable
          echo THIRDPARTY_DIR=%GITHUB_WORKSPACE%\thirdparty>> %GITHUB_ENV%
          del /Q libs.zip
        shell: cmd

      - name: Install custom Qt 5.15.2
        shell: pwsh
        run: |
          # Download Qt5.15.2 with wintab support
          New-Item -ItemType Directory -Force -Path "thirdparty\qt" | Out-Null
          $maxRetry = 3
          for ($i = 1; $i -le $maxRetry; $i++) {
            try {
              Invoke-WebRequest -Uri "https://github.com/shun-iwasawa/qt5/releases/download/v5.15.2_wintab/Qt5.15.2_wintab.zip" `
                -OutFile "Qt5.15.2_wintab.zip" -ErrorAction Stop
              break
            } catch {
              if ($i -eq $maxRetry) { Write-Error "Qt download failed after $maxRetry attempts: $_"; exit 1 }
              Write-Host "Download attempt $i failed, retrying..."
              Start-Sleep -Seconds 5
            }
          }

          # Verify zip was downloaded
          if (-not (Test-Path "Qt5.15.2_wintab.zip") -or (Get-Item "Qt5.15.2_wintab.zip").Length -lt 1MB) {
            Write-Error "Qt zip file missing or too small"
            exit 1
          }

          # Extract
          & 7z x -y Qt5.15.2_wintab.zip "-othirdparty\qt"
          if ($LASTEXITCODE -ne 0) { Write-Error "Qt extraction failed"; exit 1 }
          Remove-Item "Qt5.15.2_wintab.zip" -Force -ErrorAction SilentlyContinue

          # Find qmake.exe and derive the Qt root (parent of bin/)
          $qmake = Get-ChildItem -Path "thirdparty\qt" -Filter "qmake.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $qmake) {
            Write-Error "qmake.exe not found in extracted Qt"
            Get-ChildItem -Path "thirdparty\qt" -Recurse | Select-Object -First 30
            exit 1
          }

          # Qt root = parent of the bin/ directory that contains qmake.exe
          $qtRoot = $qmake.DirectoryName | Split-Path -Parent
          Write-Host "Found Qt at: $qtRoot"

          # Verify the path exists before saving
          if (-not (Test-Path $qtRoot)) {
            Write-Error "Detected Qt root does not exist: $qtRoot"
            exit 1
          }

          # Save to GITHUB_ENV (no trailing backslash)
          $qtRoot = $qtRoot.TrimEnd('\', '/')
          "QT_PATH=$qtRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Cache System Dependencies (OpenCV/Boost)
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            C:\tools\opencv
            ${{ env.BOOST_ROOT }}
          key: ${{ runner.os }}-deps-${{ env.OPENCV_VERSION }}-${{ env.BOOST_VERSION }}-${{ env.BOOST_TOOLSET }}

      - name: ccache storage
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Install OpenCV and Boost if cache is missing
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          @echo on
          choco install opencv --version=${{ env.OPENCV_VERSION }} -y
          choco install boost-msvc-${{ env.BOOST_TOOLSET }} --version=${{ env.BOOST_VERSION }} -y
        shell: cmd

      - name: Install Windows dependencies
        shell: cmd
        run: |
          @echo on
          if not exist ci-scripts\windows\setup-deps.cmd (
            echo ERROR: dependency script not found at ci-scripts\windows\setup-deps.cmd
            dir ci-scripts\windows
            exit /b 1
          )
          call ci-scripts\windows\setup-deps.cmd

      - name: Dump environment
        if: always()
        shell: cmd
        run: |
          @echo Environment variables at this point:
          set

      - name: Configure CMake
        run: |
          @echo on
          if exist build rmdir /S /Q build
          mkdir build
          cmake -S flare/sources -B build -G "%MSVCVERSION%" -A x64 ^
            -DQT_PATH="%QT_PATH%" ^
            -DBOOST_ROOT="%BOOST_ROOT%" ^
            -DOpenCV_DIR="%OpenCV_DIR%" ^
            -DTHIRDPARTY_DIR="%THIRDPARTY_DIR%" ^
            -DWITH_WINTAB=ON ^
            -DWITH_SYSTEM_LZO=ON ^
            -DWITH_LZODRIVER=OFF ^
            -DCMAKE_TOOLCHAIN_FILE="%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake" ^
            -DCMAKE_C_COMPILER_LAUNCHER=ccache ^
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache ^
            -DCMAKE_BUILD_TYPE=RelWithDebInfo > build\cmake_configure.log 2>&1
          if %ERRORLEVEL% NEQ 0 (
            type build\cmake_configure.log
            exit /b %ERRORLEVEL%
          )
        shell: cmd

      - name: Archive build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-windows
          path: |
            build\cmake_configure.log
            build\build.log
          if-no-files-found: ignore

      - name: Build Flare
        run: |
          cmake --build build --config RelWithDebInfo --parallel 4 > build\build.log 2>&1
          set rc=%ERRORLEVEL%
          echo --- CMake configure log ---
          if exist build\cmake_configure.log type build\cmake_configure.log
          echo --- Build log ---
          if exist build\build.log type build\build.log
          if %rc% NEQ 0 (
            echo Build failed with exit code %rc%
            exit /b %rc%
          )
          if not exist build\RelWithDebInfo\Flare.exe (
            echo ERROR: Flare.exe not produced; listing contents of build\RelWithDebInfo
            dir build\RelWithDebInfo /s /b
            exit /b 1
          )
        shell: cmd

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-windows-final
          path: |
            build\cmake_configure.log
            build\build.log
          if-no-files-found: ignore

      - name: Create Package and Final Artifact
        run: |
          @echo on
          :: 1. Create clean folder
          if exist FlarePortable rmdir /S /Q FlarePortable
          mkdir FlarePortable

          :: 2. Copy EXE (search both root and subdirs)
          set "EXE_PATH="
          for /f "delims=" %%i in ('dir /b /s "build\*Flare.exe" ^| findstr /v "CMakeFiles"') do (
            set "EXE_PATH=%%i"
            goto :copy_exe
          )
          :copy_exe
          if not defined EXE_PATH (
            echo ERROR: Flare.exe not found in build/ tree
            dir /s /b build | findstr /i "Flare.exe"
            exit /b 1
          )
          echo Found Flare.exe: %EXE_PATH%
          copy /Y "%EXE_PATH%" FlarePortable\Flare.exe

          :: 3. Copy DLLs built by CMake (all RelWithDebInfo output dirs, including vcpkg-provided DLLs)
          for /f "delims=" %%d in ('dir /b /s "build\*.dll" ^| findstr /i "RelWithDebInfo" ^| findstr /v "CMakeFiles"') do copy /Y "%%d" FlarePortable\

          :: 4. Validation
          if not exist "FlarePortable\Flare.exe" (
              echo ERROR: Flare.exe not copied. Listing exe files:
              dir /s /b build | findstr /i "Flare.exe"
              exit /b 1
          )

          :: 5. vcpkg runtime DLLs (belt-and-suspenders: also copy from vcpkg bin directly
          ::    in case CMake didn't propagate them to the build output)
          if exist "%VCPKG_ROOT%\installed\x64-windows\bin" (
              for /f "delims=" %%v in ('dir /b /s "%VCPKG_ROOT%\installed\x64-windows\bin\*.dll" 2^>nul') do copy /Y "%%v" FlarePortable\
          )

          :: 6. External thirdparty DLLs (64-bit)
          echo Copying x64 thirdparty DLLs...
          :: Generic sweep for any DLL under a path containing "64" or "x64"
          for /f "delims=" %%l in ('dir /b /s "thirdparty\*.dll" ^| findstr /i "64 x64"') do copy /Y "%%l" FlarePortable\
          :: Explicit belt-and-suspenders for the most critical ones in case the
          :: generic sweep misses a path that doesn't contain "64"/"x64"
          if exist "thirdparty\glew\glew-1.9.0\bin\64bit\glew32.dll"           copy /Y "thirdparty\glew\glew-1.9.0\bin\64bit\glew32.dll"           FlarePortable\
          if exist "thirdparty\glut\3.7.6\lib\glut64.dll"                      copy /Y "thirdparty\glut\3.7.6\lib\glut64.dll"                      FlarePortable\
          if exist "thirdparty\libmypaint\dist\64\libmypaint-1-4-0.dll"        copy /Y "thirdparty\libmypaint\dist\64\libmypaint-1-4-0.dll"        FlarePortable\
          if exist "thirdparty\libmypaint\dist\64\libiconv-2.dll"              copy /Y "thirdparty\libmypaint\dist\64\libiconv-2.dll"              FlarePortable\
          if exist "thirdparty\libmypaint\dist\64\libintl-8.dll"               copy /Y "thirdparty\libmypaint\dist\64\libintl-8.dll"               FlarePortable\
          if exist "thirdparty\libmypaint\dist\64\libjson-c-2.dll"             copy /Y "thirdparty\libmypaint\dist\64\libjson-c-2.dll"             FlarePortable\
          
          :: 7. OpenCV x64 DLLs
          :: Standard choco layout is C:\tools\opencv\build\x64\vc<N>\bin\.
          :: dir /s does NOT expand wildcards in intermediate path components,
          :: so enumerate vc14/15/16/17 explicitly, then fall back to a recursive search.
          for %%v in (vc17 vc16 vc15 vc14) do (
            if exist "C:\tools\opencv\build\x64\%%v\bin" (
              for %%f in ("C:\tools\opencv\build\x64\%%v\bin\opencv_world*.dll") do (
                if exist "%%f" copy /Y "%%f" FlarePortable\
              )
            )
          )
          :: Recursive fallback for non-standard layouts; findstr filters to x64 paths only
          for /f "delims=" %%j in ('dir /b /s "C:\tools\opencv\opencv_world*.dll" 2^>nul ^| findstr /i "\\x64\\"') do (
            copy /Y "%%j" FlarePortable\ 2>nul
          )

          :: 8. Deploy Qt + MSVC runtime
          echo Running windeployqt...
          "%QT_PATH%\bin\windeployqt.exe" "FlarePortable\Flare.exe" --opengl --compiler-runtime

          :: 9. Portable mode (stuff -> portablestuff)
          if exist "stuff" (
              mkdir "FlarePortable\portablestuff"
              xcopy /Y /E /I "stuff" "FlarePortable\portablestuff"
          )

          :: 10. System requirements README (so users know this is x64 Windows only)
          (
            echo Flare - Windows x64 Portable
            echo ================================
            echo.
            echo SYSTEM REQUIREMENTS:
            echo   Windows 10 or 11, 64-bit (x86_64/AMD64^)
            echo   ARM Windows is not supported.
            echo.
            echo USAGE:
            echo   Run Flare.exe from this folder.
            echo   Do NOT move Flare.exe out of this folder; it needs the DLLs
            echo   and portablestuff folder to be present in the same directory.
            echo.
            echo TROUBLESHOOTING:
            echo   "DLL not found" errors  ^-^>  you may have moved Flare.exe, or
            echo     your antivirus quarantined a DLL; whitelist this folder.
            echo   "wrong architecture" error  ^-^>  you are running 32-bit Windows;
            echo     this build requires 64-bit Windows.
          ) > FlarePortable\README.txt

          :: 11. Cleanup
          del /S /Q FlarePortable\*.pdb 2>nul
        shell: cmd

      - name: Smoke Test – DLL dependency check + launch test
        if: always()
        shell: pwsh
        run: |
          $log = [System.Collections.Generic.List[string]]::new()
          $log.Add("=== Windows Smoke Test ===")
          $log.Add("")

          # --- Static analysis: list all DLLs present in FlarePortable ---
          $log.Add("--- DLLs present in FlarePortable (root) ---")
          $rootDlls = @()
          if (Test-Path "FlarePortable") {
            $rootDlls = Get-ChildItem FlarePortable -Filter *.dll -File -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Name | Sort-Object
          }
          $rootDlls | ForEach-Object { $log.Add("  $_") }
          $log.Add("Total root DLLs: $($rootDlls.Count)")
          $log.Add("")

          # --- dumpbin: direct dependencies of Flare.exe ---
          $log.Add("--- dumpbin /DEPENDENTS FlarePortable\Flare.exe ---")
          if (-not (Test-Path "FlarePortable\Flare.exe")) {
            $log.Add("SKIP: FlarePortable\Flare.exe not found; skipping dependency check.")
          } else {
            try {
              $dumpout = & dumpbin /DEPENDENTS FlarePortable\Flare.exe 2>&1
              $needed  = $dumpout | Select-String '\.dll' |
                         ForEach-Object { ($_ -replace '^\s+','').Trim() } |
                         Where-Object { $_ -ne '' }
              $needed | ForEach-Object { $log.Add("  needs: $_") }
              $log.Add("")
              $log.Add("--- Checking direct deps are present ---")
              $missing = @()
              foreach ($dll in $needed) {
                $name = [System.IO.Path]::GetFileName($dll)
                $inPackage = Test-Path "FlarePortable\$name"
                $inSystem  = $null -ne (Get-Command $name -ErrorAction SilentlyContinue)
                if (-not $inPackage -and -not $inSystem) { $missing += $name }
                $log.Add("  $name -> package=$inPackage  system=$inSystem")
              }
              if ($missing.Count -gt 0) {
                $log.Add("")
                $log.Add("SMOKE TEST WARN: These DLLs are neither in FlarePortable nor system PATH:")
                $missing | ForEach-Object { $log.Add("  MISSING: $_") }
              } else {
                $log.Add("")
                $log.Add("SMOKE TEST OK: All direct DLL dependencies accounted for.")
              }
            } catch {
              $log.Add("dumpbin not available or failed: $_")
            }
          }
          $log.Add("")

          # --- Runtime test: launch Flare.exe with 8-second timeout ---
          $log.Add("--- Runtime launch test (8-second timeout, hidden window) ---")
          # Suppress Windows Error Reporting dialog boxes on this runner
          try {
            reg add "HKLM\SOFTWARE\Microsoft\Windows\Windows Error Reporting" /v DontShowUI /t REG_DWORD /d 1 /f 2>&1 | Out-Null
            reg add "HKLM\SOFTWARE\WOW6432Node\Microsoft\Windows\Windows Error Reporting" /v DontShowUI /t REG_DWORD /d 1 /f 2>&1 | Out-Null
          } catch {}

          $exePath = "$PWD\FlarePortable\Flare.exe"
          if (-not (Test-Path $exePath)) {
            $log.Add("SMOKE TEST SKIP: Flare.exe not found at $exePath")
          } else {
            try {
              $psi = New-Object System.Diagnostics.ProcessStartInfo
              $psi.FileName        = $exePath
              $psi.WorkingDirectory = "$PWD\FlarePortable"
              $psi.WindowStyle     = [System.Diagnostics.ProcessWindowStyle]::Hidden
              $psi.UseShellExecute = $true   # needed for hidden window
              $proc = [System.Diagnostics.Process]::Start($psi)
              $completed = $proc.WaitForExit(8000)
              if (-not $completed) {
                $proc.Kill()
                $log.Add("SMOKE TEST PASS: Flare.exe ran for 8+ seconds without a startup crash")
              } else {
                $raw  = $proc.ExitCode
                $hex  = "0x{0:X8}" -f ($raw -band 0xFFFFFFFF)
                $log.Add("Flare.exe exited quickly: code=$raw ($hex)")
                switch ($raw -band 0xFFFFFFFF) {
                  0xC0000135 { $log.Add("SMOKE TEST FAIL: STATUS_DLL_NOT_FOUND – a required DLL is missing from FlarePortable") }
                  0xC000007B { $log.Add("SMOKE TEST FAIL: STATUS_INVALID_IMAGE_FORMAT – wrong-bitness DLL loaded") }
                  0xC0000034 { $log.Add("SMOKE TEST WARN: STATUS_OBJECT_NAME_NOT_FOUND") }
                  0x00000000 { $log.Add("SMOKE TEST OK: Exited cleanly (exit 0)") }
                  default    { $log.Add("SMOKE TEST NOTE: Exited with code $hex (may be expected for headless run)") }
                }
              }
            } catch {
              $log.Add("SMOKE TEST ERROR: Could not launch Flare.exe – $_")
            }
          }

          # Write log and echo it
          $log | Out-File -FilePath smoke_test.log -Encoding utf8
          Write-Host ($log -join "`n")

      - name: Upload smoke test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-windows
          path: smoke_test.log
          if-no-files-found: ignore


      - name: Upload Flare Portable
        uses: actions/upload-artifact@v4
        with:
          name: Flare-Windows-Portable
          path: FlarePortable/
          if-no-files-found: error

      - name: Post build logs to PR
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && always() }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request ? context.payload.pull_request.number : undefined;
            if (!pr) { core.info('Not a pull_request event; skipping PR log posting.'); return; }
            function readTrunc(path) {
              try {
                if (!fs.existsSync(path)) return '(missing)';
                const content = fs.readFileSync(path, 'utf8');
                if (content.length > 12000) return content.slice(0, 6000) + '\n\n... (truncated) ...\n\n' + content.slice(-6000);
                return content;
              } catch (e) { return `(error reading ${path}): ${e.message}`; }
            }
            const cmake = readTrunc('build/cmake_configure.log');
            const build = readTrunc('build/build.log');
            const smoke = readTrunc('smoke_test.log');
            const note = (!fs.existsSync('build/cmake_configure.log') && !fs.existsSync('build/build.log')) ? '\n\n**Note:** log files missing – checkout or prior step may have failed.' : '';
            const body = `**Automated build logs – Windows (truncated)**\n\n--- CMake configure log ---\n${cmake}\n\n--- Build log ---\n${build}\n\n--- Smoke test (DLL check + launch test) ---\n${smoke}${note}`;
            await github.rest.issues.createComment({ owner, repo, issue_number: pr, body });
