# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
name: Publish on Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    env:
      GIT_LFS_SKIP_SMUDGE: '1'
      APPIMAGE: ''
      DMG: ''
      ARTIFACT: ''
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          lfs: false
          submodules: false
          fetch-depth: 0

      - name: Install build deps (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build ccache libboost-all-dev qtbase5-dev \
            libqt5svg5-dev libqt5opengl5-dev liblzo2-dev liblz4-dev libjpeg-dev libpng-dev libglew-dev freeglut3-dev \
            libfreetype6-dev libopencv-dev

      - name: Install build deps (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew update
          brew install qt@5 ccache ninja lz4 lzo libpng libjpeg

      - name: Install build deps (Windows)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          @echo on
          python -m pip install aqtinstall
          python -m aqt install-qt windows desktop 5.15.2 win64_msvc2019_64 -O C:\Qt -m qtscript qtmultimedia
          choco install ccache -y
          :: Determine Qt path and expose for later steps
          echo QT_PATH=C:\Qt\5.15.2\msvc2019_64>> %GITHUB_ENV%

      - name: Setup Windows thirdparty + vcpkg (Windows)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          @echo on
          :: Download prebuilt thirdparty .lib/.dll files — zip has a thirdparty/ prefix
          :: so extract at repo root to overwrite LFS-pointer stubs with real binaries
          curl -fsSL -o libs.zip https://github.com/andeon/opentoonz-thirdparty-libs/releases/download/prebuilt-libs-v1/thirdparty-libs.zip
          7z x -y libs.zip
          del /Q libs.zip

          cd thirdparty
          copy /Y tiff-4.0.3\libtiff\tif_config.vc.h tiff-4.0.3\libtiff\tif_config.h
          copy /Y tiff-4.0.3\libtiff\tiffconf.vc.h tiff-4.0.3\libtiff\tiffconf.h
          copy /Y libpng-1.6.21\scripts\pnglibconf.h.prebuilt libpng-1.6.21\pnglibconf.h
          cd ..

          :: Bootstrap vcpkg and install lzo
          if not exist vcpkg\bootstrap-vcpkg.bat (
            git clone --depth 1 https://github.com/microsoft/vcpkg.git vcpkg
          )
          pushd vcpkg
          call bootstrap-vcpkg.bat
          .\vcpkg.exe install lzo:x64-windows
          popd
          echo VCPKG_ROOT=%GITHUB_WORKSPACE%\vcpkg>> %GITHUB_ENV%
          echo THIRDPARTY_DIR=%GITHUB_WORKSPACE%\thirdparty>> %GITHUB_ENV%

      - name: Add msbuild to PATH (Windows)
        if: matrix.os == 'windows-latest'
        uses: microsoft/setup-msbuild@v2

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # shellcheck disable=SC2012,SC2016,SC2155,SC2156,SC2046,SC2086,SC2235
          mkdir -p flare/build && cd flare/build
          cmake ../sources -G Ninja -DCMAKE_BUILD_TYPE=Release -DWITH_SYSTEM_LZO=ON -DWITH_LZODRIVER=OFF 2>&1 | tee cmake_configure.log
          ninja -j2 2>&1 | tee build.log

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # shellcheck disable=SC2012,SC2016,SC2155,SC2156,SC2046,SC2086,SC2235
          cd flare
          rm -rf build
          mkdir -p build && cd build
          cmake -S ../sources -B . -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DQt5_DIR=$(brew --prefix qt@5)/lib/cmake/Qt5 \
            -DWITH_SYSTEM_LZO=ON -DWITH_LZODRIVER=OFF 2>&1 | tee cmake_configure.log
          ninja -j$(sysctl -n hw.ncpu) 2>&1 | tee build.log

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          @echo on
          if not exist build mkdir build
          cmake -S flare/sources -B build -G "Visual Studio 17 2022" -A x64 ^
            -DQT_PATH="%QT_PATH%" ^
            -DBOOST_ROOT="C:\local\boost_1_87_0" ^
            -DOpenCV_DIR="C:\tools\opencv\build" ^
            -DTHIRDPARTY_DIR="%THIRDPARTY_DIR%" ^
            -DWITH_WINTAB=ON ^
            -DWITH_SYSTEM_LZO=ON ^
            -DWITH_LZODRIVER=OFF ^
            -DCMAKE_TOOLCHAIN_FILE="%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake" ^
            -DCMAKE_BUILD_TYPE=Release > build\cmake_configure.log 2>&1
          if %ERRORLEVEL% NEQ 0 ( type build\cmake_configure.log & exit /b %ERRORLEVEL% )
          cmake --build build --config Release --parallel 4 > build\build.log 2>&1
          if %ERRORLEVEL% NEQ 0 ( type build\build.log & exit /b %ERRORLEVEL% )

      - name: Package artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # shellcheck disable=SC2012,SC2016,SC2155,SC2156,SC2046,SC2086,SC2235
          cd flare/build
          sudo ninja install
          mkdir -p appdir/usr
          cp -r /opt/flare/* appdir/usr 2>/dev/null || true
          cp appdir/usr/share/applications/*.desktop appdir/ || true
          cp appdir/usr/share/icons/hicolor/*/apps/*.png appdir/ || true
          # Create AppImage (best-effort)
          export APPIMAGE_EXTRACT_AND_RUN=1
          base_url="https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous"
          for tool in linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage; do
            wget -q "${base_url}/${tool}" && chmod +x "${tool}" || true
          done
          export PATH="$(pwd):$PATH"
          if [ -f linuxdeploy-x86_64.AppImage ]; then
            ./linuxdeploy-x86_64.AppImage --appdir=appdir --plugin=qt --output=appimage || true
          fi
          APPIMAGE=$(ls Flare*.AppImage 2>/dev/null | head -n1)
          echo "APPIMAGE=${APPIMAGE}" >> $GITHUB_ENV

      - name: Package artifact (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # shellcheck disable=SC2012,SC2016,SC2155,SC2156,SC2046,SC2086,SC2235
          cd flare/build
          DMG=""
          if [ -f flare/Flare.dmg ]; then
            DMG=flare/Flare.dmg
          elif [ -f Flare.dmg ]; then
            DMG=Flare.dmg
          fi
          echo "DMG=$DMG" >> $GITHUB_ENV

      - name: Package artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          @echo on
          if exist FlarePortable rmdir /S /Q FlarePortable
          mkdir FlarePortable

          :: Copy EXE
          for /f "delims=" %%i in ('dir /b /s "build\Flare.exe" ^| findstr /v "CMakeFiles"') do copy /Y "%%i" FlarePortable\Flare.exe
          if not exist FlarePortable\Flare.exe ( echo ERROR: Flare.exe not found & exit /b 1 )

          :: Copy DLLs built by CMake (Release config) including vcpkg-provided DLLs
          for /f "delims=" %%d in ('dir /b /s "build\*.dll" ^| findstr /i "Release" ^| findstr /v "CMakeFiles"') do copy /Y "%%d" FlarePortable\

          :: Copy vcpkg runtime DLLs directly (belt-and-suspenders)
          if exist "%VCPKG_ROOT%\installed\x64-windows\bin" (
            for /f "delims=" %%v in ('dir /b /s "%VCPKG_ROOT%\installed\x64-windows\bin\*.dll" 2^>nul') do copy /Y "%%v" FlarePortable\
          )

          :: Copy critical thirdparty DLLs
          for /f "delims=" %%l in ('dir /b /s "thirdparty\*.dll" ^| findstr /i "64 x64"') do copy /Y "%%l" FlarePortable\
          if exist "thirdparty\glew\glew-1.9.0\bin\64bit\glew32.dll"    copy /Y "thirdparty\glew\glew-1.9.0\bin\64bit\glew32.dll"    FlarePortable\
          if exist "thirdparty\glut\3.7.6\lib\glut64.dll"               copy /Y "thirdparty\glut\3.7.6\lib\glut64.dll"               FlarePortable\
          if exist "thirdparty\libmypaint\dist\64\libmypaint-1-4-0.dll" copy /Y "thirdparty\libmypaint\dist\64\libmypaint-1-4-0.dll" FlarePortable\
          if exist "thirdparty\libmypaint\dist\64\libiconv-2.dll"       copy /Y "thirdparty\libmypaint\dist\64\libiconv-2.dll"       FlarePortable\
          if exist "thirdparty\libmypaint\dist\64\libintl-8.dll"        copy /Y "thirdparty\libmypaint\dist\64\libintl-8.dll"        FlarePortable\
          if exist "thirdparty\libmypaint\dist\64\libjson-c-2.dll"      copy /Y "thirdparty\libmypaint\dist\64\libjson-c-2.dll"      FlarePortable\

          :: OpenCV x64 DLLs — enumerate vc14/15/16/17 explicitly (dir /s ignores
          :: wildcards in intermediate path components), then recursive fallback
          for %%v in (vc17 vc16 vc15 vc14) do (
            if exist "C:\tools\opencv\build\x64\%%v\bin" (
              for %%f in ("C:\tools\opencv\build\x64\%%v\bin\opencv_world*.dll") do (
                if exist "%%f" copy /Y "%%f" FlarePortable\
              )
            )
          )
          for /f "delims=" %%j in ('dir /b /s "C:\tools\opencv\opencv_world*.dll" 2^>nul ^| findstr /i "\\x64\\"') do (
            copy /Y "%%j" FlarePortable\ 2>nul
          )

          :: Deploy Qt + MSVC runtime
          "%QT_PATH%\bin\windeployqt.exe" FlarePortable\Flare.exe --opengl --compiler-runtime

          :: Add portable data folder
          if exist "stuff" ( mkdir FlarePortable\portablestuff & xcopy /Y /E /I "stuff" "FlarePortable\portablestuff" )

          :: System requirements README
          (
            echo Flare - Windows x64 Portable
            echo ================================
            echo.
            echo SYSTEM REQUIREMENTS:
            echo   Windows 10 or 11, 64-bit (x86_64/AMD64^)
            echo   ARM Windows is not supported.
            echo.
            echo USAGE:
            echo   Run Flare.exe from this folder.
            echo   Do NOT move Flare.exe out of this folder; it needs the DLLs
            echo   and portablestuff folder to be present in the same directory.
            echo.
            echo TROUBLESHOOTING:
            echo   "DLL not found" errors  ^-^>  you may have moved Flare.exe, or
            echo     your antivirus quarantined a DLL; whitelist this folder.
            echo   "wrong architecture" error  ^-^>  you are running 32-bit Windows;
            echo     this build requires 64-bit Windows.
          ) > FlarePortable\README.txt

          del /S /Q FlarePortable\*.pdb 2>nul

          :: Zip for release
          7z a -tzip Flare-Windows-${{ github.event.release.tag_name }}.zip FlarePortable\*
          echo ARTIFACT=Flare-Windows-${{ github.event.release.tag_name }}.zip>> %GITHUB_ENV%


      - name: Upload to GitHub Release (Linux AppImage)
        if: matrix.os == 'ubuntu-latest' && env.APPIMAGE != ''
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ env.APPIMAGE }}
          asset_name: Flare-Linux-${{ github.event.release.tag_name }}.AppImage
          asset_content_type: application/octet-stream

      - name: Upload to GitHub Release (macOS DMG)
        if: matrix.os == 'macos-latest' && env.DMG != ''
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: flare/build/${{ env.DMG }}
          asset_name: Flare-macOS-${{ github.event.release.tag_name }}.dmg
          asset_content_type: application/x-apple-diskimage

      - name: Upload to GitHub Release (Windows ZIP)
        if: matrix.os == 'windows-latest' && env.ARTIFACT != ''
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ env.ARTIFACT }}
          asset_name: Flare-Windows-${{ github.event.release.tag_name }}.zip
          asset_content_type: application/zip
