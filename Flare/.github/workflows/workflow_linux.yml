# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
name: Linux Build

on:
  push:
    paths:
      - '**/*'
      - '!appveyor.yml'
      - '!README.md'
      - '!doc/**'
      - '!**/.github/**'
      - '.github/workflows/workflow_linux.yml'
  pull_request:
    paths:
      - '**/*'
      - '!appveyor.yml'
      - '!README.md'
      - '!doc/**'
      - '!**/.github/**'
      - '.github/workflows/workflow_linux.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Ubuntu:
    runs-on: ubuntu-24.04
    env:
      GIT_LFS_SKIP_SMUDGE: '1'
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        lfs: false
        submodules: false
        fetch-depth: 0
        persist-credentials: true
        clean: true

    - name: Pre-check git remote reachability
      run: |
        # Only attempt a remote reachability check if an 'origin' remote exists.
        if git remote get-url origin >/dev/null 2>&1; then
          set -e
          n=0
          until [ $n -ge 3 ]
          do
            if git ls-remote origin >/dev/null 2>&1; then
              echo "git remote reachable"
              break
            fi
            n=$((n+1))
            echo "git remote not reachable, retrying ($n)"
            sleep 3
          done
        else
          echo "No 'origin' remote configured; skipping git remote reachability check (actions/checkout will handle repository checkout)."
        fi

    - name: Checkout diagnostic info
      run: |
        echo "Git version: $(git --version)"
        git status
        git branch -vv
        git log -1 --oneline
        git remote -v
        git rev-parse --is-shallow-repository
        git tag -l | head -n 20

    - name: Prune local tags to avoid non-fast-forward conflicts from rolling nightly tag updates
      run: |
        git tag -l | xargs -r git tag -d

    - name: Install libraries
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential cmake pkg-config ninja-build ccache \
          libboost-all-dev qtbase5-dev qt5-qmake qtscript5-dev \
          qttools5-dev qttools5-dev-tools qtmultimedia5-dev qtwayland5 \
          libqt5svg5-dev libqt5opengl5-dev libqt5multimedia5-plugins \
          libqt5serialport5-dev libsuperlu-dev liblz4-dev libusb-1.0-0-dev \
          liblzo2-dev libpng-dev libjpeg-dev libglew-dev freeglut3-dev \
          libfreetype6-dev libjson-c-dev libmypaint-dev libopencv-dev \
          libturbojpeg0-dev libomp-dev libfuse2 libzip-dev libminizip-dev

    - name: Set up ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-${{ matrix.compiler }}
        max-size: "2G"

    - name: Build libtiff
      run: |
        cd thirdparty/tiff-4.0.3
        chmod +x configure
        ./configure --disable-jbig --disable-shared --with-pic
        make -j2

    - name: Build Flare
      run: |
        set -x
        echo "===> Build Flare: directory debug information <==="
        pwd
        ls -la .
        if [ -d "flare" ]; then ls -la flare; else echo "ERROR: flare directory missing"; fi
        if [ -d "flare/sources" ]; then ls -la flare/sources; else echo "ERROR: flare/sources directory missing"; fi

        cd flare
        pwd
        ls -la .
        mkdir -p build && cd build
        pwd
        ls -la .

        set +e
        cmake ../sources -G Ninja \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
          -DCMAKE_C_COMPILER=${{ matrix.cc }} \
          -DWITH_TRANSLATION=OFF \
          -DWITH_SYSTEM_LZO=ON \
          -DWITH_LZODRIVER=OFF \
          -DCMAKE_BUILD_TYPE=Release > cmake_configure.log 2>&1
        rc=$?
        set -e
        echo "--- Begin CMake configure log ---"
        if [ -f cmake_configure.log ]; then cat cmake_configure.log; fi
        echo "--- End CMake configure log ---"
        if [ $rc -ne 0 ]; then echo "CMake configure failed with exit code $rc"; exit $rc; fi

        if ! (ninja -j2 2>&1 | tee build.log); then
          echo "Build failed; dumping build log..."
          if [ -f build.log ]; then cat build.log; fi
          exit 1
        fi

    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-${{ matrix.compiler }}
        path: |
          flare/build/cmake_configure.log
          flare/build/build.log
        if-no-files-found: ignore

    - name: Create Artifact
      env:
        APPIMAGE_EXTRACT_AND_RUN: 1
      run: |
        # shellcheck disable=SC2012,SC2016,SC2155,SC2156,SC2046,SC2086,SC2235
        cd flare/build
        sudo ninja install
        
        mkdir -p appdir/usr
        # copy installed files into AppDir; use || true fallbacks since
        # paths may vary by install prefix
        cp -r /opt/flare/* appdir/usr 2>/dev/null || true
        cp appdir/usr/share/applications/*.desktop appdir/ || true
        cp appdir/usr/share/icons/hicolor/*/apps/*.png appdir/ || true

        mkdir artifact
        if [ -d "appdir/usr/share/flare/stuff" ]; then
          mv appdir/usr/share/flare/stuff artifact/portablestuff
          rmdir appdir/usr/share/flare 2>/dev/null || true
        fi

        base_url="https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous"
        APPIMAGE_TOOLS_OK=1
        for tool in linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage linuxdeploy-plugin-appimage-x86_64.AppImage; do
          if ! (wget -q --show-progress "${base_url}/${tool}" || \
                wget -q --show-progress "${base_url}/${tool}" || \
                wget -q --show-progress "${base_url}/${tool}"); then
            echo "Warning: failed to download ${tool}; skipping AppImage generation for this run."
            APPIMAGE_TOOLS_OK=0
            break
          fi
          chmod +x "${tool}"
        done

        if [ -d appdir/usr/lib/flare ]; then
          export LD_LIBRARY_PATH="appdir/usr/lib/flare:${LD_LIBRARY_PATH:-}"
        fi

        # Determine main executable name (handles Flare or legacy name)
        if [ -f appdir/usr/bin/Flare ]; then
          BINNAME=Flare
        else
          BINNAME=$(ls appdir/usr/bin | head -n1)
        fi
        printf '#!/usr/bin/env bash\nexec "${APPDIR}/usr/bin/%s"\n' "${BINNAME}" > apprun.sh
        chmod 755 apprun.sh

        # Ensure linuxdeploy plugins in CWD are on PATH (required with APPIMAGE_EXTRACT_AND_RUN=1)
        export PATH="$(pwd):$PATH"

        # Build optional --executable flags for helper binaries that may exist
        EXTRA_EXECS=""
        for helper in lzocompress lzodecompress tcleanup tcomposer tconverter tfarmcontroller tfarmserver; do
          if [ -f "appdir/usr/bin/${helper}" ]; then
            EXTRA_EXECS="${EXTRA_EXECS} --executable=appdir/usr/bin/${helper}"
          fi
        done

        echo "=== AppDir contents (bin, share/applications, share/icons) ==="
        ls -la appdir/usr/bin/ || true
        ls -la appdir/usr/share/applications/ || true
        ls -la appdir/usr/share/icons/hicolor/256x256/apps/ || true
        ls -la appdir/*.desktop appdir/*.png || true
        echo "=== linuxdeploy tools ==="
        ls -la linuxdeploy* || true
        echo "=== Running linuxdeploy ==="
        if [ "${APPIMAGE_TOOLS_OK}" -eq 1 ]; then
          ./linuxdeploy-x86_64.AppImage \
            --appdir=appdir \
            --desktop-file=appdir/io.github.Flare.desktop \
            --icon-file=appdir/io.github.Flare.png \
            --plugin=qt \
            --output=appimage \
            --custom-apprun=apprun.sh || {
              echo "linuxdeploy failed with exit code $?"
              echo "=== Listing appdir structure ==="
              find appdir -maxdepth 3 -type f | head -50
              exit 1
            }
        else
          echo "Skipping linuxdeploy because required AppImage tools are unavailable."
        fi

        if ls Flare*.AppImage >/dev/null 2>&1; then mv Flare*.AppImage artifact/Flare.AppImage; fi
        ARTIFACT_NAME=Flare-${{ runner.os }}-${{ matrix.compiler }}
        mv artifact ${ARTIFACT_NAME} || true
        tar zcf ${ARTIFACT_NAME}.tar.gz ${ARTIFACT_NAME} || true

    - name: Smoke Test – verify binary launches (headless)
      if: always()
      run: |
        SMOKE_LOG="flare/build/smoke_test.log"
        mkdir -p "$(dirname "$SMOKE_LOG")"
        echo "=== Linux Smoke Test (compiler: ${{ matrix.compiler }}) ===" | tee -a "$SMOKE_LOG"

        # Install Xvfb for a headless display
        sudo apt-get install -y --no-install-recommends xvfb 2>&1 | tail -5

        # Find the installed binary (ninja install puts it under /opt/flare)
        BINARY=""
        for candidate in /opt/flare/bin/Flare /opt/flare/bin/flare \
                         /usr/local/bin/Flare /usr/local/bin/flare; do
          if [ -x "$candidate" ]; then BINARY="$candidate"; break; fi
        done

        # Fallback: look for an AppImage in the build tree
        if [ -z "$BINARY" ]; then
          APPIMAGE=$(find flare/build -name "*.AppImage" 2>/dev/null | head -1)
          if [ -n "$APPIMAGE" ]; then
            chmod +x "$APPIMAGE"
            BINARY="$APPIMAGE"
          fi
        fi

        if [ -z "$BINARY" ]; then
          echo "SMOKE TEST SKIP: No Flare binary or AppImage found" | tee -a "$SMOKE_LOG"
        else
          echo "Testing: $BINARY" | tee -a "$SMOKE_LOG"

          # Start a virtual display
          Xvfb :99 -screen 0 1280x720x24 &
          XVFB_PID=$!
          export DISPLAY=:99
          sleep 1

          # Launch with 8-second timeout; capture stderr
          timeout 8 "$BINARY" 2>&1 | tee -a "$SMOKE_LOG" &
          APP_PID=$!
          sleep 8

          if kill -0 $APP_PID 2>/dev/null; then
            kill $APP_PID 2>/dev/null
            echo "SMOKE TEST PASS: Flare ran 8+ seconds without crashing" | tee -a "$SMOKE_LOG"
          else
            wait $APP_PID 2>/dev/null
            EXIT=$?
            echo "SMOKE TEST: Flare exited with code $EXIT" | tee -a "$SMOKE_LOG"
            if [ $EXIT -ne 0 ] && [ $EXIT -ne 124 ]; then
              echo "SMOKE TEST WARN: Non-zero exit code $EXIT (may indicate missing library or crash)" | tee -a "$SMOKE_LOG"
            fi
          fi
          kill $XVFB_PID 2>/dev/null || true
        fi

    - name: Upload smoke test log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: smoke-test-linux-${{ matrix.compiler }}
        path: flare/build/smoke_test.log
        if-no-files-found: ignore

    - name: Upload
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Flare-AppImage-${{ matrix.compiler }}
        path: flare/build/*.tar.gz

    - name: Post build logs to PR
      if: ${{ github.event_name == 'pull_request' && always() }}
      uses: actions/github-script@v7
      env:
        MATRIX_COMPILER: ${{ matrix.compiler }}
      with:
        script: |
          const fs = require('fs');
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const pr = context.payload.pull_request ? context.payload.pull_request.number : undefined;
          if (!pr) { core.info('Not a pull_request event; skipping PR log posting.'); return; }
          function readTrunc(path) {
            try {
              if (!fs.existsSync(path)) return '(missing)';
              const content = fs.readFileSync(path, 'utf8');
              if (content.length > 12000) return content.slice(0, 6000) + '\n\n... (truncated) ...\n\n' + content.slice(-6000);
              return content;
            } catch (e) { return `(error reading ${path}): ${e.message}`; }
          }
          const cmake = readTrunc('flare/build/cmake_configure.log');
          const build = readTrunc('flare/build/build.log');
          const smoke = readTrunc('flare/build/smoke_test.log');
          const body = `**Automated build logs – Linux (${process.env.MATRIX_COMPILER}) (truncated)**\n\n--- CMake configure log ---\n${cmake}\n\n--- Build log ---\n${build}\n\n--- Smoke test (launch check) ---\n${smoke}`;
          await github.rest.issues.createComment({ owner, repo, issue_number: pr, body });
