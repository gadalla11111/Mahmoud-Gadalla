  - standard
templates:
  quick:
    - risk.md
    - proof.md
  standard:
    - risk.md
    - basis.md
    - plan.md
    - trace.md
    - verification.md
    - ship.md
  cm:
    - controlled-items.md
    - change-impact.md
    - baseline.md
    - variance.md
    - opex.md
  golden-path:
    - questioning-attitude.md
    - spec.md
    - turnover.md
    - self-check.md
    - decision.md
    - intent.md
    - deficiency.md
  optional:
    - standard/supplier-trust.md
    - standard/red-team.md
    - standard/execution-trace.md
    - standard/wbs.md
    - standard/incident.md
    - standard/stage-contract.md
skills:
  - questioning-attitude
  - using-nuclear-grade
  - choosing-what-to-control
  - checking-what-a-change-affects
  - recording-a-known-good-version
  - rating-change-risk
  - creating-change-records
  - briefing-an-agent
  - handing-off-work
  - double-checking-before-acting
  - proving-claims
  - checking-release-readiness
  - learning-from-experience
  - vetting-outside-code-and-models
  - checking-source-claims
  - checking-legal-and-safety-wording
  - staying-on-mission
  - reviewing-code-quality
  - stress-testing-agent-changes
  - recording-what-an-agent-did
  - breaking-down-the-work
  - organizing-project-folders
  - closing-stale-packets
  - deciding-who-decides
  - declaring-intent
  - responding-to-incidents
  - tracking-deficiencies
commands:
  - ng-question.md
  - ng-classify.md
  - ng-new.md
  - ng-what-to-control.md
  - ng-impact.md
  - ng-baseline.md
  - ng-context-pack.md
  - ng-turnover.md
  - ng-self-check.md
  - ng-prove.md
  - ng-ship-review.md
  - ng-learn.md
  - ng-trust-check.md
  - ng-source-check.md
  - ng-legal-check.md
  - ng-drift-check.md
  - ng-code-review.md
  - ng-red-team.md
  - ng-trace.md
  - ng-breakdown.md
  - ng-folders.md
  - ng-close-packet.md
  - ng-decide-authority.md
  - ng-intent.md
  - ng-incident.md
  - ng-deficiency.md
command_map:
  # The semantic skill -> command pairing the generator projects each card from
  # (see nuclear_grade/gen_commands.py and `ng gen-commands`). Declared here, not
  # in skill frontmatter, so skill frontmatter stays within the Anthropic
  # skill-creator convention (a closed key set, guarded by test_skill_contracts).
  # `using-nuclear-grade` is the always-first dispatcher and has no command.
  questioning-attitude: ng-question
  rating-change-risk: ng-classify
  creating-change-records: ng-new
  choosing-what-to-control: ng-what-to-control
  checking-what-a-change-affects: ng-impact
  recording-a-known-good-version: ng-baseline
  briefing-an-agent: ng-context-pack
  handing-off-work: ng-turnover
  double-checking-before-acting: ng-self-check
  proving-claims: ng-prove
  checking-release-readiness: ng-ship-review
  learning-from-experience: ng-learn
  vetting-outside-code-and-models: ng-trust-check
  checking-source-claims: ng-source-check
  checking-legal-and-safety-wording: ng-legal-check
  staying-on-mission: ng-drift-check
  reviewing-code-quality: ng-code-review
  stress-testing-agent-changes: ng-red-team
  recording-what-an-agent-did: ng-trace
  breaking-down-the-work: ng-breakdown
  organizing-project-folders: ng-folders
  closing-stale-packets: ng-close-packet
  deciding-who-decides: ng-decide-authority
  declaring-intent: ng-intent
  responding-to-incidents: ng-incident
  tracking-deficiencies: ng-deficiency
token_budgets:
  # Per-file token ceilings enforced by `ng tokens` (see nuclear_grade/tokens.py).
  # Seeded above the measured maxima with headroom, so the gate blocks regression,
  # not the accepted corpus. Single-sourcing the commands moved each prompt into its
  # skill's `## Prompt` section (the cards are generated from it), raising the
  # measured skill-body max to 3239 (organizing-project-folders); skill_body_max is
  # reseeded above that. The generated cards stay the leaner surface (max 1515).
  # Earlier basis, pre-single-sourcing: desc 138, skill body 2489, command 1295.
  description_max: 200
  skill_body_max: 3600
  command_max: 1600
  repeated_block_max_files: 8
boundaries:
  license: MIT
  assurance: evidence visibility only
  compliance_claim: none
