<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-labelledby="title desc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title id="title">Nuclear-grade Context Engineering</title>
  <desc id="desc">Authority without discipline is how complex systems fail. Nuclear's control loop, ported to AI-assisted software work.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E1A30"/>
      <stop offset="1" stop-color="#16263F"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3A5BA8"/>
      <stop offset="0.5" stop-color="#5BC8B3"/>
      <stop offset="1" stop-color="#FFD24D"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="640" fill="url(#bg)"/>
  <rect x="2" y="2" width="1276" height="636" fill="none" stroke="#283C5C" stroke-width="4"/>

  <text x="640" y="218" text-anchor="middle" fill="#F4F7FC" font-size="96" font-weight="800" letter-spacing="2">NUCLEAR-GRADE</text>
  <text x="640" y="284" text-anchor="middle" fill="#9DB6E0" font-size="42" font-weight="600" letter-spacing="16">CONTEXT ENGINEERING</text>

  <rect x="340" y="318" width="600" height="4" rx="2" fill="url(#rule)"/>

  <text x="640" y="380" text-anchor="middle" fill="#D7E0EE" font-size="31" font-weight="500">Authority without discipline is how complex systems fail.</text>
  <text x="640" y="426" text-anchor="middle" fill="#D7E0EE" font-size="31" font-weight="500">Nuclear&#8217;s control loop, ported to AI-assisted software work.</text>

  <text x="640" y="506" text-anchor="middle" fill="#7FA0C9" font-size="24" font-style="italic">Go fast while exploring. Slow down when it becomes a promise.</text>

  <text x="640" y="582" text-anchor="middle" fill="#5BC8B3" font-size="22" font-weight="600" letter-spacing="1">question &#183; specify &#183; execute &#183; verify &#183; decide &#183; baseline &#183; operate</text>
</svg>
