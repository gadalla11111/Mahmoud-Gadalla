name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        # pyyaml is test-only (the shipped nuclear_grade package keeps zero runtime
        # deps); it lets the scaffold-ci test parse the generated workflow as real YAML.
        run: python -m pip install --upgrade pip pytest ruff pyyaml

      - name: Run tests
        run: python -m pytest -q

      - name: Run ruff lint
        run: python -m ruff check .

      - name: Compile Python files
        run: python -m py_compile tools/ng.py tools/ng_validate.py docs/03-worked-examples/ai-agent-tool-permissions/reference/workspace_guard.py

      - name: Run repo doctor
        run: python tools/ng.py doctor .

      - name: Enforce token budget
        run: python tools/ng.py tokens .

      - name: Validate change packets
        shell: bash
        run: |
          set -euo pipefail
          # Skip packets deliberately closed via the documented closure path
          # (a `NUCLEAR-GRADE-CLOSED: <rationale>` line): kept for audit history,
          # the validator still rejects their unfilled fields.
          is_closed() { grep -rqE '^[[:space:]]*NUCLEAR-GRADE-CLOSED:[[:space:]]*[^[:space:]]' "$1"; }
          for packet in .nuclear/changes/*; do
            [ -d "$packet" ] || continue
            if is_closed "$packet"; then echo "Skipping closed record: $packet"; continue; fi
            python tools/ng.py validate "$packet"
          done
          while IFS= read -r packet; do
            if is_closed "$packet"; then echo "Skipping closed record: $packet"; continue; fi
            python tools/ng.py validate "$packet"
          done < <(find docs/03-worked-examples -path '*/.nuclear/changes/*' -type d -prune -print)

  wheel-smoke:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build wheel
        run: python -m build --wheel --outdir dist

      - name: Install wheel into clean venv
        shell: bash
        run: |
          set -euo pipefail
          python -m venv /tmp/wheel-smoke-venv
          /tmp/wheel-smoke-venv/bin/pip install --upgrade pip
          /tmp/wheel-smoke-venv/bin/pip install dist/*.whl

      - name: Smoke-test installed CLI outside source tree
        shell: bash
        run: |
          set -euo pipefail
          NG=/tmp/wheel-smoke-venv/bin/nuclear-grade
          WORK=$(mktemp -d)
          cd "$WORK"
          "$NG" init .
          "$NG" new my-quick --mode quick
          "$NG" new my-std --mode standard
          "$NG" new my-cm --mode cm
          "$NG" new my-gp --mode golden-path
          LIST_OUTPUT=$("$NG" list)
          echo "$LIST_OUTPUT"
          echo "$LIST_OUTPUT" | grep -q "Skills:"
          echo "$LIST_OUTPUT" | grep -q "questioning-attitude"
          echo "$LIST_OUTPUT" | grep -q "ng-question.md"
          set +e
          "$NG" validate .nuclear/changes/my-quick
          rc=$?
          set -e
          [ "$rc" -eq 1 ]
          echo "wheel-smoke OK"

  mcp-smoke:
    # The MCP server ships behind the optional `mcp` extra, so the main `validate`
    # job stays zero-dependency and its test is importorskip-skipped there. This
    # job installs the extra so build_server() and list_tools() actually run --
    # otherwise the server could break and CI would stay green.
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install with the optional MCP extra
        run: |
          python -m pip install --upgrade pip pytest
          python -m pip install -e ".[mcp]"

      - name: Run MCP server tests with the extra present
        run: python -m pytest tests/test_mcp_server.py -q
